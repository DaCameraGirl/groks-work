<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="Grok and Angela — pair programming badge">
  <defs>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1f4a"/>
      <stop offset="100%" stop-color="#16102a"/>
    </linearGradient>
    <linearGradient id="angela" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="100%" stop-color="#ed4f8f"/>
    </linearGradient>
    <linearGradient id="grok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b7cff"/>
      <stop offset="100%" stop-color="#5c3fd4"/>
    </linearGradient>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="50%" stop-color="#f8e8ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="520" height="200" rx="22" fill="url(#card)" stroke="#4a3d6e" stroke-width="1.5"/>

  <!-- Angela -->
  <circle cx="110" cy="88" r="46" fill="url(#angela)"/>
  <text x="110" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" fill="#fff">A</text>
  <text x="110" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffd4e8">Angela</text>
  <text x="110" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#a9a7c9">Product · Approval · Vision</text>

  <!-- connection pulse -->
  <path d="M168 88 Q260 50 352 88" fill="none" stroke="url(#link)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
  </path>
  <text x="260" y="72" text-anchor="middle" font-size="20" fill="#f8e8ff">⚡
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#c4b8e8" letter-spacing="1">PAIR PROGRAM</text>

  <!-- Grok -->
  <circle cx="410" cy="88" r="46" fill="url(#grok)"/>
  <text x="410" y="98" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" fill="#fff">G</text>
  <text x="410" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#d4c8ff">Grok</text>
  <text x="410" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#a9a7c9">Branches · PRs · Ship</text>

  <!-- lanyard hole -->
  <rect x="240" y="8" width="40" height="10" rx="5" fill="#0f0a1a" stroke="#4a3d6e"/>
</svg>